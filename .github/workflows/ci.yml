name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: backend lint + test + audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: install
        run: npm ci
      - name: lint
        run: npm run lint
      - name: test
        run: npm test
      # `npm audit` is advisory; CI fails only on high+ severity. Local
      # `npm audit` (no threshold) still surfaces moderate findings.
      - name: audit (high+)
        run: npm run audit:ci
